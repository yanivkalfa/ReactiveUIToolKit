name: Bug Report
description: Report a bug in ReactiveUIToolKit or the UITKX language tooling
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project is affected?
      options:
        - Runtime (rendering, hooks, reconciler)
        - Source Generator (code generation, diagnostics)
        - UITKX Language (parser, formatter)
        - VS Code Extension
        - Visual Studio 2022 Extension
        - LSP Server (completions, hover, diagnostics)
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: "Package version from package.json or extension version"
      placeholder: "e.g. 0.2.23 / vscode 1.0.282 / vs2022 1.0.58"
    validations:
      required: true

  - type: input
    id: unity-version
    attributes:
      label: Unity Version
      description: "If applicable"
      placeholder: "e.g. 6000.1.2f1"

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps or a .uitkx snippet to reproduce the issue
      placeholder: |
        1. Create a .uitkx file with this content:
        ```
        @component Example
        <Box>
          ...
        </Box>
        ```
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Output / Logs
      description: "Paste any error messages, compiler output, or LSP logs (VS Code: set `uitkx.trace.server` to `verbose`)"
      render: text

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
