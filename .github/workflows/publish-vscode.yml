name: Publish VS Code Extension

on:
  push:
    tags: ["ide-v*"]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Build LSP server ──────────────────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Build & publish LSP server
        run: |
          dotnet publish ide-extensions~/lsp-server/UitkxLanguageServer.csproj \
            -c Release \
            --runtime linux-x64 \
            --self-contained false \
            -o ide-extensions~/vscode/server

      # ── Build VS Code extension ───────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ide-extensions~/vscode
        run: npm ci

      - name: Compile TypeScript
        working-directory: ide-extensions~/vscode
        run: npm run build

      # prebuild copies the grammar JSON; build compiles TS
      - name: Package extension
        working-directory: ide-extensions~/vscode
        run: npx vsce package --no-dependencies -o uitkx-${{ github.ref_name }}.vsix

      # ── Publish to VS Code Marketplace ───────────────────────────────────
      - name: Publish to VS Marketplace
        working-directory: ide-extensions~/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish --no-dependencies --pat "$VSCE_PAT"

      # Also publish to Open VSX for Gitpod / VSCodium users
      - name: Publish to Open VSX
        working-directory: ide-extensions~/vscode
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        run: npx ovsx publish uitkx-${{ github.ref_name }}.vsix -p "$OVSX_TOKEN"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: uitkx-vscode-${{ github.ref_name }}
          path: ide-extensions~/vscode/uitkx-${{ github.ref_name }}.vsix
