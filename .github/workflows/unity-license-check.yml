# One-off sanity check for the Unity CI credentials that arm build-unitypackage.
#
# Unity discontinued manual (.alf/.ulf) activation for Personal licenses, so CI uses
# per-run named-user activation with an email + password. Setup (once):
#   1. Use a Unity ID WITHOUT two-factor auth for CI — headless activation cannot answer
#      a 2FA prompt. If your main account has 2FA (it should!), create a dedicated free
#      account (e.g. yourname+ci@gmail.com), sign into unity.com once, and accept the
#      Personal license terms.
#   2. Repo Settings -> Secrets and variables -> Actions: add UNITY_EMAIL and
#      UNITY_PASSWORD with that account's credentials.
#   3. Run this workflow: green = credentials work, license activates and returns.
# Keep UNITY_VERSION in lockstep with publish.yml's build-unitypackage job.
name: Unity license check

on:
  workflow_dispatch:

jobs:
  license-check:
    runs-on: ubuntu-latest
    env:
      UNITY_VERSION: "6000.2.6f1"
    steps:
      - name: Activate + return a Personal license seat
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          if [ -z "$UNITY_EMAIL" ] || [ -z "$UNITY_PASSWORD" ]; then
            echo "::error::UNITY_EMAIL / UNITY_PASSWORD secrets are not set."
            exit 1
          fi
          mkdir -p proj/Assets proj/ProjectSettings
          echo "m_EditorVersion: $UNITY_VERSION" > proj/ProjectSettings/ProjectVersion.txt
          docker run --rm \
            -v "$PWD:/workspace" -w /workspace \
            -e UNITY_EMAIL -e UNITY_PASSWORD \
            unityci/editor:ubuntu-${UNITY_VERSION}-base-3 \
            bash -lc '
              set -e
              trap "unity-editor -batchmode -nographics -quit -returnlicense -username \"$UNITY_EMAIL\" -password \"$UNITY_PASSWORD\" -logFile - || true" EXIT
              unity-editor -batchmode -nographics -quit \
                -username "$UNITY_EMAIL" -password "$UNITY_PASSWORD" \
                -projectPath /workspace/proj -logFile - | tee /workspace/activate.log
              grep -qi "Licensing::Module\|License" /workspace/activate.log || true
              echo "activation run completed"
            '
          echo "::notice::Unity credentials verified — build-unitypackage is armed."
