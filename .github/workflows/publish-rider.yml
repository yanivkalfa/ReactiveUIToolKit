name: Publish Rider Plugin

on:
  push:
    tags: ["ide-v*"]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Build LSP server ──────────────────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Build & publish LSP server (linux-x64)
        run: |
          dotnet publish ide-extensions~/lsp-server/UitkxLanguageServer.csproj \
            -c Release \
            --runtime linux-x64 \
            --self-contained false \
            -o ide-extensions~/rider/src/main/resources/server

      # ── Build & publish Rider plugin ──────────────────────────────────────
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "corretto"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build plugin
        working-directory: ide-extensions~/rider
        run: ./gradlew buildPlugin

      - name: Sign plugin
        working-directory: ide-extensions~/rider
        env:
          CERTIFICATE_CHAIN:   ${{ secrets.JETBRAINS_CERTIFICATE_CHAIN }}
          PRIVATE_KEY:         ${{ secrets.JETBRAINS_PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.JETBRAINS_PRIVATE_KEY_PASSWORD }}
        run: ./gradlew signPlugin

      - name: Publish plugin to JetBrains Marketplace
        working-directory: ide-extensions~/rider
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: ./gradlew publishPlugin

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: uitkx-rider-${{ github.ref_name }}
          path: ide-extensions~/rider/build/distributions/*.zip
