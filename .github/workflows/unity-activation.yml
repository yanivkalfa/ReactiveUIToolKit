# One-off helper to arm the build-unitypackage job in publish.yml.
#
# Unity 6 machines with Hub sign-in use named-user licensing (no local .ulf), and a
# licensed machine won't emit an activation file — so the .alf must be generated on a
# licenseless runner. Flow (once):
#   1. Actions -> "Unity activation file" -> Run workflow.
#   2. Download the Unity_alf artifact, extract Unity_v*.alf.
#   3. Upload it at https://license.unity3d.com/manual (choose Unity Personal).
#   4. Download the resulting Unity_v*.ulf, open it in a text editor, and paste the FULL
#      contents into a new repo secret named UNITY_LICENSE
#      (Settings -> Secrets and variables -> Actions).
# Keep UNITY_VERSION here in lockstep with publish.yml's build-unitypackage job.
name: Unity activation file

on:
  workflow_dispatch:

jobs:
  request-alf:
    runs-on: ubuntu-latest
    env:
      UNITY_VERSION: "6000.2.6f1"
    steps:
      - name: Generate .alf with the floor Unity
        run: |
          mkdir -p proj/Assets proj/ProjectSettings out
          echo "m_EditorVersion: $UNITY_VERSION" > proj/ProjectSettings/ProjectVersion.txt
          docker run --rm \
            -v "$PWD:/workspace" -w /workspace \
            unityci/editor:ubuntu-${UNITY_VERSION}-base-3 \
            bash -lc '
              unity-editor -batchmode -nographics -quit \
                -projectPath /workspace/proj \
                -createManualActivationFile -logFile - || true
              cp /workspace/proj/*.alf /workspace/out/ 2>/dev/null || cp ./*.alf /workspace/out/ 2>/dev/null || true
              ls -la /workspace/out
            '
          ls out/*.alf || { echo "::error::no .alf produced — check the log above"; exit 1; }

      - name: Upload the activation file
        uses: actions/upload-artifact@v4
        with:
          name: Unity_alf
          path: out/*.alf
