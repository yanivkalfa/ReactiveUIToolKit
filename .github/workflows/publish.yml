name: Publish

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # Dist branch — publishes only if version changed
  # ════════════════════════════════════════════════════════════════════════════
  deploy-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version already published
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git tag --list "v$VERSION" | grep -q .; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Unity package v$VERSION already published — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Build source generator DLLs
        if: steps.check.outputs.skip == 'false'
        run: |
          dotnet restore SourceGenerator~/ReactiveUITK.SourceGenerator.csproj
          dotnet build SourceGenerator~/ReactiveUITK.SourceGenerator.csproj -c Release --no-restore

      - name: Read paths to omit from config.json
        if: steps.check.outputs.skip == 'false'
        run: |
          node -e "
            const config = require('./config.json');
            const paths = config.pathsToOmitFromDist || [];
            console.log(JSON.stringify(paths));
          " > /tmp/omit_paths.json

      - name: Build dist
        if: steps.check.outputs.skip == 'false'
        run: |
          set -e
          DIST_DIR="dist_build"

          mkdir -p "$DIST_DIR"

          rsync -a \
            --exclude='.git' \
            --exclude='.vs' \
            --exclude='.github' \
            --exclude='dist_build' \
            --exclude='dist~' \
            ./ "$DIST_DIR/"

          node -e "
            const fs = require('fs');
            const path = require('path');
            const patterns = JSON.parse(fs.readFileSync('/tmp/omit_paths.json', 'utf8'));
            const distDir = '$DIST_DIR';

            function rmSafe(p) {
              const full = path.join(distDir, p);
              if (fs.existsSync(full)) {
                const stat = fs.statSync(full);
                if (stat.isDirectory()) {
                  fs.rmSync(full, { recursive: true });
                } else {
                  fs.unlinkSync(full);
                }
                console.log('Removed: ' + p);
              }
              const meta = full + '.meta';
              if (fs.existsSync(meta)) {
                fs.unlinkSync(meta);
                console.log('Removed: ' + p + '.meta');
              }
            }

            for (const pattern of patterns) {
              const trimmed = pattern.trim().replace(/\\\\/g, '/');
              if (trimmed.endsWith('/**')) {
                rmSafe(trimmed.slice(0, -3));
              } else {
                rmSafe(trimmed);
              }
            }
          "

          if [ -d "$DIST_DIR/Samples" ]; then
            rm -rf "$DIST_DIR/Samples~"
            mv "$DIST_DIR/Samples" "$DIST_DIR/Samples~"
            rm -f "$DIST_DIR/Samples.meta"
          fi

      - name: Push to dist branch
        if: steps.check.outputs.skip == 'false'
        run: |
          set -e
          VERSION="v${{ steps.check.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git worktree add -B dist _dist_worktree origin/dist 2>/dev/null || {
            git worktree add -b dist _dist_worktree HEAD
          }

          find _dist_worktree -mindepth 1 -not -path '*/.git/*' -not -name '.git' -delete
          cp -r dist_build/* _dist_worktree/

          cd _dist_worktree
          git add -A
          if git diff --cached --quiet; then
            echo "No dist changes to deploy"
          else
            git commit -m "dist update $VERSION"
          fi
          git push origin dist

          cd ..
          git worktree remove _dist_worktree

      - name: Tag published version
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.check.outputs.version }}"
          git push origin "v${{ steps.check.outputs.version }}"

  # ════════════════════════════════════════════════════════════════════════════
  # Documentation site
  # ════════════════════════════════════════════════════════════════════════════
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: ReactiveUIToolKitDocs~
        run: npm ci

      - name: Build
        working-directory: ReactiveUIToolKitDocs~
        run: npm run build

      - name: Deploy to documentations branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git worktree add --force _docs_branch documentations 2>/dev/null || {
            git branch documentations
            git worktree add _docs_branch documentations
          }

          find _docs_branch -mindepth 1 -not -path '*/.git/*' -not -name '.git' -delete
          cp -r ReactiveUIToolKitDocs~/dist/* _docs_branch/

          cd _docs_branch
          git add -A
          git diff --cached --quiet && echo "No docs changes to deploy" && exit 0
          git commit -m "docs update"
          git push origin documentations

          cd ..
          git worktree remove _docs_branch

  # ════════════════════════════════════════════════════════════════════════════
  # VS Code extension — publishes only if version changed
  # ════════════════════════════════════════════════════════════════════════════
  publish-vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version already published
        id: check
        run: |
          VERSION=$(node -p "require('./ide-extensions~/vscode/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git tag --list "vscode-v$VERSION" | grep -q .; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::VS Code extension v$VERSION already published — skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup .NET
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Build LSP server
        if: steps.check.outputs.skip == 'false'
        run: |
          dotnet publish ide-extensions~/lsp-server/UitkxLanguageServer.csproj \
            -c Release \
            --self-contained false \
            -o ide-extensions~/vscode/server

      - name: Setup Node.js
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate CHANGELOG.md from centralized changelog
        if: steps.check.outputs.skip == 'false'
        run: node scripts/changelog.mjs extract --ide vscode --out ide-extensions~/vscode/CHANGELOG.md

      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        working-directory: ide-extensions~/vscode
        run: npm ci

      - name: Package extension
        if: steps.check.outputs.skip == 'false'
        working-directory: ide-extensions~/vscode
        run: npx vsce package --no-dependencies -o uitkx.vsix

      - name: Publish to VS Marketplace
        id: publish
        if: steps.check.outputs.skip == 'false'
        working-directory: ide-extensions~/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          npx vsce publish --no-dependencies --pat "$VSCE_PAT"

      - name: Tag published version
        if: steps.check.outputs.skip == 'false' && steps.publish.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "vscode-v${{ steps.check.outputs.version }}"
          git push origin "vscode-v${{ steps.check.outputs.version }}"

      - name: Upload VSIX artifact
        if: steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: uitkx-vscode-${{ steps.check.outputs.version }}
          path: ide-extensions~/vscode/uitkx.vsix

  # ════════════════════════════════════════════════════════════════════════════
  # Visual Studio 2022 extension — publishes only if version changed
  # ════════════════════════════════════════════════════════════════════════════
  publish-vs2022:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version already published
        id: check
        shell: pwsh
        run: |
          [xml]$manifest = Get-Content "ide-extensions~/visual-studio/UitkxVsix/source.extension.vsixmanifest"
          $version = $manifest.PackageManifest.Metadata.Identity.Version
          echo "version=$version" >> $env:GITHUB_OUTPUT
          $existing = git tag --list "vs2022-v$version"
          if ($existing) {
            echo "skip=true" >> $env:GITHUB_OUTPUT
            echo "::notice::VS 2022 extension v$version already published — skipping"
          } else {
            echo "skip=false" >> $env:GITHUB_OUTPUT
          }

      - name: Setup .NET
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Build LSP server
        if: steps.check.outputs.skip == 'false'
        run: |
          dotnet publish ide-extensions~/lsp-server/UitkxLanguageServer.csproj `
            -c Release `
            --runtime win-x64 `
            --self-contained false `
            -o ide-extensions~/visual-studio/UitkxVsix/server

      - name: Generate overview.md from centralized changelog
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        run: node scripts/changelog.mjs extract-overview --ide vs2022 --template ide-extensions~/visual-studio/UitkxVsix/overview-template.md --out ide-extensions~/visual-studio/UitkxVsix/overview.md

      - name: Build VSIX
        if: steps.check.outputs.skip == 'false'
        shell: cmd
        working-directory: ide-extensions~/visual-studio/UitkxVsix
        run: |
          rem Locate the installed VS via vswhere instead of hardcoding the edition/year
          rem (windows-latest moved from VS 2022 to VS 2026 in June 2026; -prerelease + -products * matches any).
          set "VSWHERE=C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          for /f "usebackq tokens=*" %%i in (`"%VSWHERE%" -latest -prerelease -products * -requires Microsoft.Component.MSBuild -property installationPath`) do set "VSINSTALL=%%i"
          if not defined VSINSTALL echo ERROR: No Visual Studio with MSBuild found via vswhere & exit /b 1
          echo Using Visual Studio at "%VSINSTALL%"
          call "%VSINSTALL%\Common7\Tools\VsDevCmd.bat" -no_logo
          msbuild UitkxVsix.csproj -t:Restore -p:Configuration=Release -v:minimal
          msbuild UitkxVsix.csproj -t:Build -p:Configuration=Release -p:DeployExtension=false -v:minimal
          msbuild UitkxVsix.csproj -t:CreateVsixContainer -p:Configuration=Release -p:DeployExtension=false -v:minimal

      - name: Verify VSIX contains LSP server
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        working-directory: ide-extensions~/visual-studio/UitkxVsix
        run: |
          # Find the VSIX and verify it contains UitkxLanguageServer.exe
          $vsix = Get-ChildItem -Recurse -Filter "*.vsix" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $vsix) { Write-Error "No VSIX found after build"; exit 1 }
          $zip = $vsix.FullName -replace '\.vsix$', '.zip'
          $tmp = Join-Path $env:TEMP 'vsix-verify'
          try {
            Copy-Item $vsix.FullName $zip -Force
            if (Test-Path $tmp) { Remove-Item $tmp -Recurse -Force }
            Expand-Archive $zip $tmp -Force
            $server = Get-ChildItem $tmp -Recurse -Filter "UitkxLanguageServer.exe"
            if (-not $server) {
              Write-Host "::error::VSIX is missing UitkxLanguageServer.exe! Contents:"
              Get-ChildItem $tmp -Recurse | ForEach-Object { Write-Host $_.FullName }
              exit 1
            }
            Write-Host "Verified: VSIX contains $($server.FullName)"
          } finally {
            Remove-Item $zip -Force -ErrorAction SilentlyContinue
            Remove-Item $tmp -Recurse -Force -ErrorAction SilentlyContinue
          }

      - name: Locate VSIX
        if: steps.check.outputs.skip == 'false'
        id: find_vsix
        shell: pwsh
        working-directory: ide-extensions~/visual-studio/UitkxVsix
        run: |
          # Search in known output locations
          $candidates = @(
            "bin\Release\net472\UitkxVsix.vsix",
            "bin\Release\UitkxVsix.vsix",
            "UitkxVsix.vsix"
          )
          $found = $null
          foreach ($c in $candidates) {
            if (Test-Path $c) { $found = (Resolve-Path $c).Path; break }
          }
          if (-not $found) {
            # Fallback: recursive search
            $vsix = Get-ChildItem -Recurse -Filter "*.vsix" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($vsix) { $found = $vsix.FullName }
          }
          if (-not $found) {
            Write-Host "::error::No .vsix file found. Listing build output:"
            Get-ChildItem -Recurse bin | Format-Table FullName
            exit 1
          }
          Write-Host "Found VSIX: $found"
          echo "VSIX_PATH=$found" >> $env:GITHUB_OUTPUT

      - name: Publish to VS Marketplace
        id: publish
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        working-directory: ide-extensions~/visual-studio/UitkxVsix
        env:
          MARKETPLACE_TOKEN: ${{ secrets.VS_MARKETPLACE_TOKEN }}
        run: |
          $pub = Get-ChildItem -Path "$env:USERPROFILE\.nuget\packages\microsoft.vssdk.buildtools" -Recurse -Filter "VsixPublisher.exe" |
                 Where-Object { $_.DirectoryName -match 'tools[\\/]vssdk[\\/]bin$' } |
                 Sort-Object FullName -Descending |
                 Select-Object -First 1
          if (-not $pub) {
            Write-Host "::error::VsixPublisher.exe not found in NuGet cache"
            exit 1
          }
          Write-Host "Using: $($pub.FullName)"
          $output = & $pub.FullName publish `
            -payload "${{ steps.find_vsix.outputs.VSIX_PATH }}" `
            -publishManifest publishManifest.json `
            -personalAccessToken $env:MARKETPLACE_TOKEN 2>&1 | Out-String
          $exitCode = $LASTEXITCODE
          Write-Host $output
          $uploaded = $output -match 'Uploaded'
          if ($uploaded) {
            Write-Host "Marketplace upload confirmed"
            # VsixPublisher 17.14.2120 crashes during telemetry shutdown after a
            # successful upload (System.Runtime.CompilerServices.Unsafe version
            # mismatch in the VS telemetry stack), leaving $LASTEXITCODE = 1.
            # Since the marketplace confirmed the upload, force a clean exit so
            # GitHub Actions does not mark this step as failed.
            $global:LASTEXITCODE = 0
            exit 0
          } elseif ($exitCode -ne 0) {
            Write-Host "::error::VsixPublisher failed (exit code $exitCode) and no upload confirmation found"
            exit $exitCode
          } else {
            Write-Host "::warning::VsixPublisher exited cleanly but no upload confirmation found in output"
          }

      - name: Tag published version
        if: steps.check.outputs.skip == 'false' && steps.publish.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "vs2022-v${{ steps.check.outputs.version }}"
          git push origin "vs2022-v${{ steps.check.outputs.version }}"

      - name: Upload VSIX artifact
        if: steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: uitkx-vs2022-${{ steps.check.outputs.version }}
          path: ${{ steps.find_vsix.outputs.VSIX_PATH }}

  # ════════════════════════════════════════════════════════════════════════════
  # Asset Store .unitypackage — Tier A of Plans~/ASSET_STORE_PUBLISHING_PLAN.md.
  # Assembles the store-shaped content (dist omit-list applied, Samples kept visible)
  # into a shell Unity project, imports it with the FLOOR Unity version (the store
  # derives compatibility from the upload editor; reviewers test on the floor), exports
  # ReactiveUIToolKit-<version>.unitypackage via CICD/Editor/AssetStoreExport.cs, and
  # uploads it as a run artifact. The store upload itself stays manual — Unity ships no
  # publish API — so the last mile is: download artifact (or export locally), then
  # Tools -> Asset Store -> Uploader -> Export and Upload -> Submit for review.
  # INERT UNTIL ARMED: set repo secret UNITY_LICENSE to the contents of a Unity .ulf
  # (generate: Unity -batchmode -createManualActivationFile -> upload the .alf at
  # license.unity.com/manual -> download the .ulf). Idempotent via the store-v<ver> tag.
  # ════════════════════════════════════════════════════════════════════════════
  build-unitypackage:
    runs-on: ubuntu-latest
    env:
      # Floor Unity version (store compatibility floor, see the plan §6). Needs a
      # matching unityci/editor docker image; bump the trailing image revision (-3)
      # if the pull ever 404s.
      UNITY_VERSION: "6000.2.6f1"
      HAS_LICENSE: ${{ secrets.UNITY_LICENSE != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version + license arming
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git tag --list "store-v$VERSION" | grep -q .; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Asset Store package store-v$VERSION already built — skipping"
          elif [ "$HAS_LICENSE" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=Unity Asset Store::build-unitypackage is INERT — add the UNITY_LICENSE repo secret (contents of a Unity .ulf) to arm it."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Assemble store-shaped shell project
        if: steps.check.outputs.skip == 'false'
        run: |
          set -e
          STORE_DIR="shell/Assets/ReactiveUIToolKit"
          mkdir -p "$STORE_DIR"

          rsync -a \
            --exclude='.git' \
            --exclude='.vs' \
            --exclude='.github' \
            --exclude='shell' \
            --exclude='out' \
            --exclude='dist_build' \
            --exclude='dist~' \
            ./ "$STORE_DIR/"

          # Same omit-list as the dist build (pathsToOmitFromDist) PLUS the store-only
          # hygiene list (pathsToOmitFromStore: repo-internal docs, workspace files —
          # anything a paying customer's Assets folder must not contain).
          node -e "
            const fs = require('fs');
            const path = require('path');
            const cfg = require('./config.json');
            const patterns = (cfg.pathsToOmitFromDist || []).concat(cfg.pathsToOmitFromStore || []);
            const distDir = '$STORE_DIR';

            function rmSafe(p) {
              const full = path.join(distDir, p);
              if (fs.existsSync(full)) {
                const stat = fs.statSync(full);
                if (stat.isDirectory()) {
                  fs.rmSync(full, { recursive: true });
                } else {
                  fs.unlinkSync(full);
                }
                console.log('Removed: ' + p);
              }
              const meta = full + '.meta';
              if (fs.existsSync(meta)) {
                fs.unlinkSync(meta);
                console.log('Removed: ' + p + '.meta');
              }
            }

            for (const pattern of patterns) {
              const trimmed = pattern.trim().replace(/\\\\/g, '/');
              if (trimmed.endsWith('/**')) {
                rmSafe(trimmed.slice(0, -3));
              } else {
                rmSafe(trimmed);
              }
            }
          "

          # Re-include CICD/: it hosts the export method. The method itself excludes
          # CICD from the .unitypackage and guard-rails against it leaking.
          rsync -a CICD/ "$STORE_DIR/CICD/"
          cp CICD.meta "$STORE_DIR/CICD.meta"

          # Unlike dist (UPM channel), the store package keeps Samples/ visible — no
          # Samples~ move: store users expect importable demo content.

          mkdir -p shell/ProjectSettings
          echo "m_EditorVersion: $UNITY_VERSION" > shell/ProjectSettings/ProjectVersion.txt

          # Customer-baseline manifest: default engine modules + the Input System package,
          # which some Samples use (their generated code references UnityEngine.InputSystem —
          # without it the package cannot compile in a fresh project, which is an instant
          # store-review rejection). Keep the store draft's "package dependencies" declaring
          # com.unity.inputsystem so customer installs pull it automatically.
          mkdir -p shell/Packages
          cat > shell/Packages/manifest.json <<'MANIFEST'
          {
            "dependencies": {
              "com.unity.inputsystem": "1.19.0",
              "com.unity.ugui": "2.0.0",
              "com.unity.modules.accessibility": "1.0.0",
              "com.unity.modules.ai": "1.0.0",
              "com.unity.modules.androidjni": "1.0.0",
              "com.unity.modules.animation": "1.0.0",
              "com.unity.modules.assetbundle": "1.0.0",
              "com.unity.modules.audio": "1.0.0",
              "com.unity.modules.cloth": "1.0.0",
              "com.unity.modules.director": "1.0.0",
              "com.unity.modules.imageconversion": "1.0.0",
              "com.unity.modules.imgui": "1.0.0",
              "com.unity.modules.jsonserialize": "1.0.0",
              "com.unity.modules.particlesystem": "1.0.0",
              "com.unity.modules.physics": "1.0.0",
              "com.unity.modules.physics2d": "1.0.0",
              "com.unity.modules.screencapture": "1.0.0",
              "com.unity.modules.terrain": "1.0.0",
              "com.unity.modules.terrainphysics": "1.0.0",
              "com.unity.modules.tilemap": "1.0.0",
              "com.unity.modules.ui": "1.0.0",
              "com.unity.modules.uielements": "1.0.0",
              "com.unity.modules.umbra": "1.0.0",
              "com.unity.modules.unityanalytics": "1.0.0",
              "com.unity.modules.unitywebrequest": "1.0.0",
              "com.unity.modules.unitywebrequestassetbundle": "1.0.0",
              "com.unity.modules.unitywebrequestaudio": "1.0.0",
              "com.unity.modules.unitywebrequesttexture": "1.0.0",
              "com.unity.modules.unitywebrequestwww": "1.0.0",
              "com.unity.modules.vehicles": "1.0.0",
              "com.unity.modules.video": "1.0.0",
              "com.unity.modules.vr": "1.0.0",
              "com.unity.modules.wind": "1.0.0",
              "com.unity.modules.xr": "1.0.0"
            }
          }
          MANIFEST

      - name: Import + export with the floor Unity
        if: steps.check.outputs.skip == 'false'
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          OUT_FILE: out/ReactiveUIToolKit-${{ steps.check.outputs.version }}.unitypackage
        run: |
          set -e
          mkdir -p out
          printf '%s' "$UNITY_LICENSE" > Unity_lic.ulf
          docker run --rm \
            -v "$PWD:/workspace" -w /workspace \
            -e OUT_FILE="$OUT_FILE" \
            unityci/editor:ubuntu-${UNITY_VERSION}-base-3 \
            bash -lc '
              # Activation exits nonzero on some editor versions even when it succeeds;
              # the export run below is the real gate.
              unity-editor -batchmode -nographics -quit -manualLicenseFile /workspace/Unity_lic.ulf -logFile - || true
              unity-editor -batchmode -nographics -quit \
                -projectPath /workspace/shell \
                -executeMethod ReactiveUITK.CICD.AssetStoreExport.Run \
                -exportOut "/workspace/$OUT_FILE" \
                -logFile -
            '
          rm -f Unity_lic.ulf

      - name: Verify the package
        if: steps.check.outputs.skip == 'false'
        run: |
          set -e
          PKG="out/ReactiveUIToolKit-${{ steps.check.outputs.version }}.unitypackage"
          [ -f "$PKG" ] || { echo "::error::unitypackage missing"; exit 1; }
          SIZE=$(stat -c%s "$PKG")
          COUNT=$(tar -tzf "$PKG" | wc -l)
          echo "unitypackage: $COUNT tar entries, $SIZE bytes"
          [ "$SIZE" -gt 200000 ] || { echo "::error::unitypackage suspiciously small ($SIZE bytes)"; exit 1; }
          [ "$COUNT" -gt 200 ] || { echo "::error::unitypackage has too few entries ($COUNT)"; exit 1; }

      - name: Upload artifact
        if: steps.check.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: ReactiveUIToolKit-unitypackage-${{ steps.check.outputs.version }}
          path: out/*.unitypackage

      - name: Tag built version
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "store-v${{ steps.check.outputs.version }}"
          git push origin "store-v${{ steps.check.outputs.version }}"

      - name: Store upload reminder (no publish API)
        if: steps.check.outputs.skip == 'false'
        run: echo "::notice title=Unity Asset Store::Package built. Download the artifact, then from a Unity $UNITY_VERSION project run Tools -> Asset Store -> Uploader -> select the package draft -> Export and Upload, and Submit for review at publisher.unity.com (updates review in ~2 business days)."

